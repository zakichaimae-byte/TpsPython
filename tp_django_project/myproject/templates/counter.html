<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat compteur</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .result-card { border: none; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 4rem 3rem; text-align: center; max-width: 500px; width: 100%; background: white; }
        .counter-number { font-size: 5rem; font-weight: 800; color: #4F46E5; line-height: 1; margin: 1.5rem 0; }
    </style>
</head>
<body>
    <div class="result-card">
        <h1 class="h2 fw-bold text-dark mb-2">Analyse Terminée</h1>
        
        <div class="counter-number">{{ amount }}</div>
        <p class="text-muted fs-5 mb-4">mots détectés dans votre texte</p>
        
        <div class="mt-5">
            <a href="/" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">← Retour à l'accueil</a>
        </div>
    </div>
</body>
</html>
