<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
        .auth-card { border: none; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 3rem; width: 100%; max-width: 500px; background: white; }
    </style>
</head>
<body>
    
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 class="h2 fw-bold text-primary">Créer un compte</h1>
            <p class="text-muted">Rejoignez-nous en quelques secondes</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-floating mb-3">
                <input type="text" class="form-control" name="username" id="usernameInput" placeholder="Username" required>
                <label for="usernameInput">Nom d'utilisateur</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="email" class="form-control" name="email" id="emailInput" placeholder="Email" required>
                <label for="emailInput">Adresse e-mail</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control" name="password" id="passwordInput" placeholder="Password" required>
                <label for="passwordInput">Mot de passe</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" name="password2" id="password2Input" placeholder="Confirm Password" required>
                <label for="password2Input">Confirmer le mot de passe</label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm mb-3">S'inscrire</button>
        </form>

        <div class="text-center mt-4">
            <p class="mb-2">Vous avez déjà un compte ? <a href="login" class="text-primary text-decoration-none fw-bold">Se connecter</a></p>
            <a href="/" class="text-muted small text-decoration-none">← Retour à l'accueil</a>
        </div>
    </div>

    <!-- Bootstrap JS for dismissible alerts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
